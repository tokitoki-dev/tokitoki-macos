name: Release

# Pushing a semver tag (v1.2.0) produces a signed, notarized, Sparkle-signed
# release: native arm64 and amd64 DMGs plus the `<dmg>.sig` EdDSA signatures
# the appcast requires. A DMG without its .sig never appears in the feed.
# Publishing to users still happens in /admin/releases.
#
# Required `production` environment secrets — the release cannot run without
# all of them, and the signing job cannot access them until deployment approval:
#   MACOS_CERTIFICATE_P12        base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD   the .p12's password
#   KEYCHAIN_PASSWORD            any string; protects the throwaway keychain
#   AC_API_KEY_P8                App Store Connect API key (.p8 contents)
#   AC_API_KEY_ID                its key id
#   AC_API_ISSUER_ID             its issuer id
#   SPARKLE_PRIVATE_KEY          `generate_keys -x` output (base64 EdDSA key)

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

env:
  SPARKLE_VERSION: 2.9.4
  SPARKLE_SHA256: ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: tokitoki-macos
          fetch-depth: 0

      - name: Verify the release tag belongs to main
        working-directory: tokitoki-macos
        run: |
          git fetch origin main --no-tags
          commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          if ! git merge-base --is-ancestor "$commit" origin/main; then
            echo "Release tags must point to a commit on main" >&2
            exit 1
          fi

      - name: Fetch pinned CLI release
        working-directory: tokitoki-macos
        run: scripts/fetch-cli-release.sh

      - name: Build for testing (unsigned)
        run: |
          xcodebuild -project tokitoki-macos/tokitoki-macos.xcodeproj \
            -scheme tokitoki-macos -configuration Debug \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO \
            TOKITOKI_CLI_DIR="$GITHUB_WORKSPACE/tokitoki-macos/.build/cli" \
            build-for-testing

      - name: Run unit tests
        run: |
          xcodebuild -project tokitoki-macos/tokitoki-macos.xcodeproj \
            -scheme tokitoki-macos -configuration Debug \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO \
            TOKITOKI_CLI_DIR="$GITHUB_WORKSPACE/tokitoki-macos/.build/cli" \
            test-without-building -only-testing:tokitoki-macosTests

      - name: Verify the bundled CLI matches the app architecture
        run: |
          app="build/Build/Products/Debug/Tokitoki.app"
          app_archs="$(lipo -archs "$app/Contents/MacOS/Tokitoki")"
          cli_archs="$(lipo -archs "$app/Contents/Resources/tokitoki")"
          test "$cli_archs" = "$app_archs"

  release:
    needs: verify
    runs-on: macos-26
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: tokitoki-macos

      - name: Fetch pinned CLI release
        working-directory: tokitoki-macos
        run: scripts/fetch-cli-release.sh

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 3600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain
          rm "$RUNNER_TEMP/cert.p12"

      - name: Archive architecture-specific apps
        run: |
          version="${GITHUB_REF_NAME#v}"
          # CURRENT_PROJECT_VERSION becomes CFBundleVersion, which Sparkle
          # compares against the appcast's sparkle:version — both must be the
          # release's semver or installed apps stop seeing updates.
          for arch in arm64 amd64; do
            if [ "$arch" = arm64 ]; then
              xcode_arch=arm64
            else
              xcode_arch=x86_64
            fi

            xcodebuild -project tokitoki-macos/tokitoki-macos.xcodeproj \
              -scheme tokitoki-macos -configuration Release \
              -derivedDataPath "build/$arch/DerivedData" \
              -archivePath "build/$arch/tokitoki.xcarchive" \
              MARKETING_VERSION="$version" \
              CURRENT_PROJECT_VERSION="$version" \
              TOKITOKI_CLI_DIR="$GITHUB_WORKSPACE/tokitoki-macos/.build/cli" \
              ARCHS="$xcode_arch" ONLY_ACTIVE_ARCH=NO \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Developer ID Application" \
              archive
          done

      - name: Export architecture-specific apps
        run: |
          for arch in arm64 amd64; do
            xcodebuild -exportArchive \
              -archivePath "build/$arch/tokitoki.xcarchive" \
              -exportOptionsPlist tokitoki-macos/ExportOptions.plist \
              -exportPath "build/$arch/export"
          done

      - name: Notarize and staple apps
        env:
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          echo "$AC_API_KEY_P8" > "$RUNNER_TEMP/ac_api_key.p8"
          for arch in arm64 amd64; do
            app="build/$arch/export/Tokitoki.app"
            archive="build/$arch/notarize.zip"
            ditto -c -k --keepParent "$app" "$archive"
            xcrun notarytool submit "$archive" \
              --key "$RUNNER_TEMP/ac_api_key.p8" \
              --key-id "$AC_API_KEY_ID" \
              --issuer "$AC_API_ISSUER_ID" \
              --wait
            xcrun stapler staple "$app"
            rm "$archive"
          done
          rm "$RUNNER_TEMP/ac_api_key.p8"

      - name: Verify signature, notarization, and architectures
        run: |
          for arch in arm64 amd64; do
            if [ "$arch" = arm64 ]; then
              expected=arm64
            else
              expected=x86_64
            fi

            app="build/$arch/export/Tokitoki.app"
            codesign --verify --deep --strict --verbose=2 "$app"
            xcrun stapler validate "$app"
            spctl --assess --type execute --verbose=2 "$app"

            for binary in \
              "$app/Contents/MacOS/Tokitoki" \
              "$app/Contents/Resources/tokitoki"; do
              actual="$(lipo -archs "$binary")"
              if [ "$actual" != "$expected" ]; then
                echo "Expected $expected only, found '$actual' in $binary" >&2
                exit 1
              fi
            done

            # Sparkle is supplied as a vendor-signed universal XCFramework.
            # Preserve that supported artifact, but prove every executable in
            # the app can run on the architecture named by this package.
            while IFS= read -r -d '' binary; do
              if file "$binary" | grep -q 'Mach-O'; then
                actual="$(lipo -archs "$binary")"
                if ! grep -qw "$expected" <<< "$actual"; then
                  echo "Missing $expected slice in $binary (found '$actual')" >&2
                  exit 1
                fi
              fi
            done < <(find "$app/Contents" -type f -perm -111 -print0)

            cli="$app/Contents/Resources/tokitoki"
            cli_size="$(stat -f %z "$cli")"
            if [ "$cli_size" -ge 16000000 ]; then
              echo "Bundled CLI size regression: $cli_size bytes" >&2
              exit 1
            fi
            echo "$arch app: $(du -sh "$app" | cut -f1); CLI: $cli_size bytes"
          done

      - name: Package DMGs
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for arch in arm64 amd64; do
            stage="$RUNNER_TEMP/dmg-root-$arch"
            mkdir -p "$stage"
            ditto "build/$arch/export/Tokitoki.app" "$stage/Tokitoki.app"
            ln -s /Applications "$stage/Applications"
            dmg="dist/Tokitoki-$version-$arch.dmg"
            hdiutil create -srcfolder "$stage" -volname Tokitoki \
              -format UDZO "$dmg"
            codesign --force --timestamp --sign "Developer ID Application" "$dmg"
            du -h "$dmg"
          done

      - name: Notarize and staple DMGs
        env:
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          echo "$AC_API_KEY_P8" > "$RUNNER_TEMP/ac_api_key.p8"
          for dmg in dist/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --key "$RUNNER_TEMP/ac_api_key.p8" \
              --key-id "$AC_API_KEY_ID" \
              --issuer "$AC_API_ISSUER_ID" \
              --wait
            xcrun stapler staple "$dmg"
            codesign --verify --verbose=2 "$dmg"
            xcrun stapler validate "$dmg"
          done
          rm "$RUNNER_TEMP/ac_api_key.p8"

      - name: Sparkle-sign the DMGs
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -sSfL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"
          echo "$SPARKLE_SHA256  $RUNNER_TEMP/sparkle.tar.xz" | shasum -a 256 -c -
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP" bin/sign_update
          keyfile="$RUNNER_TEMP/sparkle_key"
          (umask 077 && printf '%s' "$SPARKLE_PRIVATE_KEY" > "$keyfile")
          for dmg in dist/*.dmg; do
            "$RUNNER_TEMP/bin/sign_update" -f "$keyfile" -p "$dmg" > "$dmg.sig"
            test -s "$dmg.sig"
          done
          rm "$keyfile"

      - name: Archive debug symbols
        run: |
          version="${GITHUB_REF_NAME#v}"
          for arch in arm64 amd64; do
            ditto -c -k --keepParent "build/$arch/tokitoki.xcarchive/dSYMs" \
              "dist/Tokitoki-$version-$arch-dSYMs.zip"
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
